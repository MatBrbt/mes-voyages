<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mes Voyages</title>
<style>
  body{font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;background:#F7F4F0;color:#5C5248;gap:14px}
  .spin{width:28px;height:28px;border:3px solid #DDD8D0;border-top-color:#C0392B;border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="spin"></div>
<div>Chargement de Mes Voyages&hellip;</div>
<script>
// Charge l'application depuis Supabase Storage (contenu mis à jour sans toucher à cette page)
fetch('https://kteglannapjlxzqgtkgo.supabase.co/storage/v1/object/public/app/index.html?v=' + Date.now())
  .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(function(html){
    document.open();
    document.write(html);
    document.close();
  })
  .catch(function(){
    document.body.innerHTML = '<div style="text-align:center;padding:20px">Impossible de charger l’application.<br>Vérifiez votre connexion puis rechargez la page.</div>';
  });
</script>
</body>
</html>
